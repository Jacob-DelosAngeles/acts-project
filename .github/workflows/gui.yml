name: gui

on:
  push:
    paths:
      - "gui/**"
      - ".github/workflows/gui.yml"
  pull_request:
    paths:
      - "gui/**"
      - ".github/workflows/gui.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - run: npm ci
      - run: npm run lint

      # No automated test suite exists for gui/ yet (renderer/js has zero
      # test files) — this workflow only catches lint regressions until
      # that's added.
