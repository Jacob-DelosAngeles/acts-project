name: core

on:
  push:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      # pandas 1.5.3 / statsmodels 0.13.2 (pinned in requirements/base.txt)
      # have no wheels for Python >=3.11 — 3.10 is the newest that installs
      # cleanly without a source build.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - run: pip install -r requirements/base.txt -r requirements/dev.txt -e .
      - run: pytest
