# Render Blueprint for Project ACTS.
# Deploys the Flask API (api/) as a free web service.
# Import via the Render dashboard: New + -> Blueprint -> pick this repo.
# Spec: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: acts-api
    runtime: python
    plan: free
    rootDir: api
    # requirements.txt pulls in `-e ../core` (the modeling engine) plus Flask,
    # google-cloud-storage and gunicorn. The full repo is checked out, so the
    # relative path to ../core resolves from the api/ root dir.
    buildCommand: pip install -r requirements.txt
    # Fitting the four discrete-choice models is slow (tens of seconds, more
    # on the free tier's shared CPU), so raise gunicorn's 30s default worker
    # timeout well above it. One worker keeps memory within the 512MB free
    # tier; the extra threads let health checks respond while a fit is running
    # so Render doesn't mark the instance unhealthy mid-request.
    startCommand: gunicorn main:app --workers 1 --threads 8 --timeout 300
    healthCheckPath: /
    envVars:
      # The old dependency pins (pandas 1.x, statsmodels 0.13.x) only build on
      # Python 3.10 — do not bump this without checking the model math.
      - key: PYTHON_VERSION
        value: 3.10.11
      # Keep model fitting inside the 512MB free tier: run the VIF filter in a
      # single process (no per-core dataframe copies) and stop numpy/scipy from
      # spawning a thread pool per BLAS call.
      - key: ACTS_VIF_N_JOBS
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      # Cloud Storage bucket name for /inputs/upload. Safe to leave unset on a
      # first deploy: the app still boots and /osm/ways, /inputs/load and
      # /models/run all work; only uploads return 503 until this is set.
      - key: CLOUD_STORAGE_INPUT_FILES
        sync: false
      # Service-account key JSON (the whole key file pasted as one value).
      # Only needed once storage (Firebase/GCS) is wired up.
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
